spring:
  application:
    name: core_service

  #Admin Server:
  boot:
    admin:
      client:
        url: http://localhost:1111/

  datasource:
    url: jdbc:postgresql://localhost:5432/core_postgres
    username: postgres
    password: Naveds@2003
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 9092


logging:
  level:
    root: INFO
  file:
    name: logs/workflow.log

#Actuators
management:
  endpoints:
    web:
      exposers:
        include: '*'

